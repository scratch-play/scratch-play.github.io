<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Список проектов</title>
  <style>
    .projects {
      display: flex;
      flex-wrap: wrap;
    }
    .project {
      margin: 10px;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Список проектов</h1>
  <div class="projects" id="projects"></div>
  <div id="game" style="display:none;">
    <h1>Игра</h1>
    <iframe src="" frameborder="0" width="100%" height="100%"></iframe>
  </div>

  <script>
    // получаем список проектов из студии ScratchDB
    fetch('https://api.scratchdb.com/v1/projects/studios/51676986')
      .then(response => response.json())
      .then(data => {
        const projectsList = data.projects;
        const projectsElement = document.getElementById('projects');
        projectsList.forEach(project => {
          const projectElement = document.createElement('div');
          projectElement.classList.add('project');
          projectElement.textContent = project.title;
          projectElement.onclick = () => {
            const gameElement = document.getElementById('game');
            gameElement.style.display = 'block';
            document.getElementById('projects').style.display = 'none';
            const iframe = gameElement.querySelector('iframe');
            iframe.src = `https://scratch.mit.edu/projects/${project.id}/embed`;
          };
          projectsElement.appendChild(projectElement);
        });
      })
      .catch(error => {
        console.error(error);
      });
  </script>
</body>
</html>
