<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Scratch Studio Быстрая Загрузка</title>
  <style>
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background-color: #121227;
      margin: 0; padding: 16px;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    #container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      width: 100%;
      max-width: 960px;
    }
    .card {
      background: #1e1e3f;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      color: #eee;
      overflow: hidden;
      box-shadow: 0 3px 6px rgb(34 41 63 / 0.4);
      display: flex;
      flex-direction: column;
      transition: transform 0.15s ease;
      user-select: none;
    }
    .card:hover {
      transform: scale(1.05);
    }
    .card img {
      width: 100%;
      height: 100px;
      object-fit: cover;
      background-color: #111;
      display: block;
    }
    .title {
      padding: 8px;
      font-weight: 600;
      font-size: 14px;
      flex-grow: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    button#loadMoreBtn {
      margin: 20px auto;
      padding: 10px 24px;
      font-size: 16px;
      background-color: #4060f8;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      user-select: none;
      transition: background-color 0.3s ease;
      min-width: 140px;
    }
    button#loadMoreBtn:disabled {
      background-color: #666;
      cursor: not-allowed;
    }
    button#loadMoreBtn:hover:not(:disabled) {
      background-color: #2e4add;
    }
    .error {
      color: #f55;
      margin-top: 20px;
      font-weight: bold;
      text-align: center;
      width: 100%;
      max-width: 600px;
    }
  </style>
</head>
<body>

  <h2>Проекты студии Scratch</h2>
  <div id="container"></div>
  <button id="loadMoreBtn">Загрузить ещё</button>
  <div class="error" id="errorMsg" style="display:none;"></div>

  <script>
    const studioId = 51676986;
    const limit = 20;
    let offset = 0;
    let loading = false;
    let finished = false;

    const container = document.getElementById('container');
    const loadMoreBtn = document.getElementById('loadMoreBtn');
    const errorMsg = document.getElementById('errorMsg');

    async function fetchProjects() {
      if (loading || finished) return;
      loading = true;
      loadMoreBtn.disabled = true;
      errorMsg.style.display = "none";
      loadMoreBtn.textContent = "Загрузка...";

      const apiUrl = `https://api.scratch.mit.edu/studios/${studioId}/projects?limit=${limit}&offset=${offset}`;
      const proxyUrl = 'https://thingproxy.freeboard.io/fetch/' + apiUrl;

      try {
        const response = await fetch(proxyUrl, { cache: "no-store" });
        if (!response.ok) throw new Error(`Ошибка сервера: ${response.status}`);

        const projects = await response.json();

        if (!Array.isArray(projects) || projects.length === 0) {
          if (offset === 0) {
            errorMsg.textContent = 'В студии нет проектов.';
            errorMsg.style.display = 'block';
          }
          finished = true;
          loadMoreBtn.style.display = 'none';
          return;
        }

        projects.forEach(proj => {
          const card = document.createElement('a');
          card.className = 'card';
          card.href = `/game#${proj.id}`;
          card.title = proj.title;
          card.target = '_self';

          const img = document.createElement('img');
          img.src = `https://cdn2.scratch.mit.edu/get_image/project/${proj.id}_480x360.png`;
          img.alt = proj.title;
          img.loading = 'lazy';

          const title = document.createElement('div');
          title.className = 'title';
          title.textContent = proj.title;

          card.appendChild(img);
          card.appendChild(title);
          container.appendChild(card);
        });

        offset += projects.length;
        if (projects.length < limit) {
          finished = true;
          loadMoreBtn.style.display = 'none';
        }

      } catch (error) {
        errorMsg.textContent = `Ошибка при загрузке проектов: ${error.message}`;
        errorMsg.style.display = 'block';
        if (offset === 0) loadMoreBtn.style.display = 'none';
      } finally {
        loading = false;
        if (!finished) {
          loadMoreBtn.disabled = false;
          loadMoreBtn.textContent = 'Загрузить ещё';
        }
      }
    }

    loadMoreBtn.addEventListener('click', fetchProjects);

    // Первый вызов сразу запускаем загрузку
    fetchProjects();
  </script>

</body>
</html>
