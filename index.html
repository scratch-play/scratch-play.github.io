<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Загрузка Scratch проектов</title>
  <style>
    /* Стили из предыдущего варианта */
    body { font-family: Arial; max-width: 900px; margin: 20px auto; background: #f5f5f5; color:#222;}
    h1, h2 { text-align: center; }
    form { background:#fff; padding:20px; border-radius:8px; margin-bottom:30px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    label { display:block; margin-bottom:8px; font-weight:bold; }
    input[type=text], input[type=file] { width:100%; padding:6px 8px; margin-bottom:14px; box-sizing:border-box; }
    button { padding:10px 20px; background:#0077ff; color:#fff; border:none; border-radius:5px; cursor:pointer; transition:background-color 0.2s ease; }
    button:disabled { background:#aaa; cursor:not-allowed; }
    #projects { display:flex; flex-wrap:wrap; gap:15px; justify-content:center; }
    .card { cursor:pointer; width:180px; background:#fff; border:1px solid #ddd; border-radius:8px; overflow:hidden; text-align:center; box-shadow:0 2px 5px rgb(0 0 0 / 0.1); transition: box-shadow 0.2s ease; user-select:none; }
    .card:hover { box-shadow:0 5px 15px rgb(0 0 0 / 0.2); }
    .card img { width:100%; height:120px; object-fit:contain; background:#eee; }
    .card .title { padding:10px 8px; font-size:16px; font-weight:bold; height:48px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
  </style>
</head>
<body>
  <h1>Загрузка Scratch проектов</h1>

  <form id="uploadForm" enctype="multipart/form-data">
    <label for="title">Название проекта</label>
    <input type="text" id="title" name="title" required placeholder="Введите название"/>

    <label for="projectFile">Файл проекта (.sb3)</label>
    <input type="file" id="projectFile" name="projectFile" accept=".sb3" required/>

    <label for="thumbnail">Обложка (URL изображения)</label>
    <input type="text" id="thumbnail" name="thumbnail" placeholder="https://example.com/image.png" />

    <button type="submit">Загрузить проект</button>
  </form>

  <h2>Загруженные проекты</h2>
  <div id="projects">Загрузка...</div>

  <!-- Подключаем Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js"></script>
  <script>
    (function(){
      const SUPABASE_URL = 'https://uiaczufpqmrwrjbyffib.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVpYWN6dWZwcW1yd3JqYnlmZmliIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3OTY2NjI5MSwiZXhwIjoyMDk1MjQyMjkxfQ.EB0A6U13MXaVdCM5nEQqib-C0dIT9g4xUZiHB8et5aw';

      // Инициализируем supabase клиент, чтобы не затенять глобальный объект
      const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const uploadForm = document.getElementById('uploadForm');
      const projectsContainer = document.getElementById('projects');

      async function loadProjects() {
        projectsContainer.textContent = 'Загрузка...';

        const { data, error } = await supabaseClient
          .from('projects')
          .select('id, title, project_file_url, thumbnail_url')
          .order('added_at', { ascending: false });

        if(error) {
          projectsContainer.textContent = 'Ошибка загрузки проектов: ' + error.message;
          return;
        }

        if(!data || data.length === 0) {
          projectsContainer.textContent = 'Пока нет проектов';
          return;
        }

        projectsContainer.innerHTML = '';
        data.forEach(({id, title, thumbnail_url}) => {
          const card = document.createElement('div');
          card.className = 'card';
          card.title = title;
          card.onclick = () => {
            window.location.href = `/game#${id}`;
          };

          card.innerHTML = `
            <img src="${thumbnail_url || 'https://via.placeholder.com/180x120?text=No+Image'}" alt="${title}" />
            <div class="title" title="${title}">${title}</div>
          `;

          projectsContainer.appendChild(card);
        });
      }

      uploadForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const title = uploadForm.title.value.trim();
        const projectFile = uploadForm.projectFile.files[0];
        let thumbnail = uploadForm.thumbnail.value.trim();

        if (!title || !projectFile) {
          alert('Введите название и выберите файл .sb3');
          return;
        }
        if(projectFile.size > 50 * 1024 * 1024) {
          alert('Максимальный размер файла 50 МБ');
          return;
        }
        if(!projectFile.name.toLowerCase().endsWith('.sb3')) {
          alert('Файл должен иметь расширение .sb3');
          return;
        }

        if (!thumbnail) thumbnail = '';

        const btn = uploadForm.querySelector('button');
        btn.disabled = true;
        btn.textContent = 'Загрузка...';

        try {
          const fileName = `projects/${Date.now()}_${projectFile.name}`;

          let { error: uploadError } = await supabaseClient.storage
            .from('projects')
            .upload(fileName, projectFile, { cacheControl: '3600', upsert: false });

          if(uploadError) throw uploadError;

          const { data: publicURLData } = supabaseClient.storage.from('projects').getPublicUrl(fileName);
          const project_file_url = publicURLData.publicUrl;

          const { error: dbError } = await supabaseClient.from('projects').insert([{
            title,
            project_file_url,
            thumbnail_url: thumbnail,
          }]);

          if(dbError) throw dbError;

          alert('Проект успешно загружен!');
          uploadForm.reset();
          loadProjects();
        }
        catch(err) {
          alert('Ошибка при загрузке: ' + err.message);
          console.error(err);
        }
        finally {
          btn.disabled = false;
          btn.textContent = 'Загрузить проект';
        }
      });

      loadProjects();
    })();
  </script>
</body>
</html>
