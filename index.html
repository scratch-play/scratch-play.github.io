<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Scratch студия - проекты</title>
  <style>
    body {
      background: #1e1e2f;
      color: #eee;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0; padding: 20px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      min-height: 100vh;
    }
    .card {
      background: #2a2a45;
      border-radius: 12px;
      width: 180px;
      cursor: pointer;
      box-shadow: 0 8px 15px rgba(0,0,0,0.3);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 20px rgba(255,255,255,0.25);
    }

    .card img {
      width: 100%;
      height: 135px;
      object-fit: cover;
      display: block;
    }

    .card-title {
      padding: 12px;
      font-size: 1em;
      font-weight: 600;
      text-align: center;
      min-height: 50px;
      color: #fff;
    }

    .error {
      color: #ff5555;
      font-weight: bold;
      font-size: 1.2em;
      width: 100%;
      text-align: center;
      margin-top: 40px;
    }

    .load-more {
      width: 100%;
      text-align: center;
      margin: 30px 0 0;
    }

    .load-more button {
      background: #4a90e2;
      border: none;
      color: white;
      padding: 12px 25px;
      font-size: 1em;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    .load-more button:hover {
      background: #357ABD;
    }
  </style>
</head>
<body>
  <div id="cards-container"></div>
  <div class="load-more" id="load-more-container">
    <button id="load-more-btn">Загрузить ещё</button>
  </div>

<script>
  (function() {
    const proxyEndpoint = 'https://scratch-play-proxy-l2dlhac0k-tagir-s-projects.vercel.app/api/proxy';
    const studioApiBase = 'https://api.scratch.mit.edu/studios/51676986/projects';
    const limit = 40;  // Сколько проектов за раз загружаем

    const container = document.getElementById('cards-container');
    const loadMoreBtn = document.getElementById('load-more-btn');
    const loadMoreContainer = document.getElementById('load-more-container');

    let offset = 0;
    let isLoading = false;
    let allLoaded = false;

    async function loadProjects() {
      if (isLoading || allLoaded) return;

      isLoading = true;
      loadMoreBtn.disabled = true;
      loadMoreBtn.textContent = 'Загрузка...';

      const url = `${studioApiBase}?limit=${limit}&offset=${offset}`;
      const proxyUrl = proxyEndpoint + '?url=' + encodeURIComponent(url);

      try {
        const resp = await fetch(proxyUrl);
        if (!resp.ok) throw new Error(`Ошибка сети: ${resp.status}`);

        const projects = await resp.json();

        if (!Array.isArray(projects) || projects.length === 0) {
          if (offset === 0) {
            container.innerHTML = `<div class="error">Нет проектов для отображения</div>`;
          }
          allLoaded = true;
          loadMoreContainer.style.display = 'none';
          return;
        }

        projects.forEach(proj => {
          const card = document.createElement('div');
          card.className = 'card';
          card.title = proj.title;

          const imageUrl = proj.image || proj.image_url || proj.thumbnail_url || 'https://scratch.mit.edu/site-api/images/scratch3.png';

          card.innerHTML = `
            <img src="${imageUrl}" alt="${proj.title}" loading="lazy" />
            <div class="card-title">${proj.title}</div>
          `;

          card.addEventListener('click', () => {
            window.location.href = '/game#' + proj.id;
          });

          container.appendChild(card);
        });

        offset += projects.length;
        if (projects.length < limit) {
          allLoaded = true;
          loadMoreContainer.style.display = 'none';
        }

      } catch (e) {
        console.error(e);
        if (offset === 0) {
          container.innerHTML = `<div class="error">Ошибка при загрузке проектов: ${e.message}</div>`;
          loadMoreContainer.style.display = 'none';
        }
      } finally {
        isLoading = false;
        if (!allLoaded) {
          loadMoreBtn.disabled = false;
          loadMoreBtn.textContent = 'Загрузить ещё';
        }
      }
    }

    loadMoreBtn.addEventListener('click', loadProjects);

    // Первый автозапуск загрузки проектов
    loadProjects();
  })();
</script>
</body>
</html>
