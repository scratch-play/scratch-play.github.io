<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scratch Студия</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; background: #fafafa; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; }
        .controls { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 25px; align-items: center; }
        #status { font-weight: bold; padding: 10px 15px; background: #eee; border-radius: 6px; font-size: 14px; }
        #search-input { flex: 1; min-width: 200px; max-width: 400px; padding: 12px; border: 2px solid #ddd; border-radius: 8px; outline: none; }
        #search-input:focus { border-color: #4c97ff; }
        #search-input:disabled { opacity: 0.6; cursor: not-allowed; } 
        .btn-random, button.btn-back { padding: 12px 20px; font-weight: bold; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .btn-random { background: #2ecc71; display: none; }
        button.btn-back { background: #4c97ff; margin-bottom: 20px; }
        .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .project-card { background: #fff; border: 1px solid #ddd; border-radius: 10px; overflow: hidden; cursor: pointer; display: flex; flex-direction: column; transition: transform 0.2s; }
        .project-card:hover { transform: translateY(-4px); border-color: #4c97ff; }
        .project-card img { width: 100%; aspect-ratio: 4/3; object-fit: cover; }
        .project-card-title { padding: 12px; font-size: 14px; font-weight: bold; text-align: center; }
        #game-view, #search-input:disabled { display: none; }
        .player-wrapper { position: relative; width: 100%; padding-top: 56.25%; border-radius: 12px; overflow: hidden; border: 2px solid #ddd; }
        .player-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; }
        @media (max-width: 480px) {
            body { padding: 12px; } .controls { gap: 10px; } #search-input, .btn-random { width: 100%; order: 2; }
            .projects-grid { grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 12px; }
        }
    </style>
</head>
<body>
    <div class="container" id="catalog-view">
        <h1>Список проектов студии</h1>
        <div class="controls">
            <div id="status">Загрузка проектов...</div>
            <input type="text" id="search-input" placeholder="Поиск проекта..." disabled>
            <button class="btn-random" id="random-btn" onclick="playRandomGame()">🎲 Случайная игра</button>
        </div>
        <div class="projects-grid" id="projects-container"></div>
    </div>
    <div class="container" id="game-view">
        <button class="btn-back" onclick="toggleView(false)">← Назад</button>
        <h2 id="game-title">Игра</h2>
        <div class="player-wrapper"><iframe id="scratch-player" frameborder="0" allowfullscreen></iframe></div>
    </div>
    <script>
        const STUDIO_ID = '51676986', PAGE_LIMIT = 40;
        const PROXY_URL = 'https://scratch-play-proxy.vercel.app/';
        let offset = 0, projectCollection = [];

        async function fetchStudioProjects() {
            const statusLabel = document.getElementById('status');
            try {
                const apiTarget = `https://mit.edu/${STUDIO_ID}/projects?limit=${PAGE_LIMIT}&offset=${offset}&_nocache=${Date.now()}`;
                const response = await fetch(PROXY_URL + encodeURIComponent(apiTarget));
                if (!response.ok) throw new Error();
                const data = await response.json();

                if (data && data.length > 0) {
                    projectCollection = projectCollection.concat(data);
                    offset += PAGE_LIMIT;
                    statusLabel.textContent = `Загрузка... Получено: ${projectCollection.length}`;
                    setTimeout(fetchStudioProjects, 250);
                } else {
                    statusLabel.textContent = `Успешно загружено: ${projectCollection.length}`;
                    document.getElementById('search-input').disabled = false;
                    document.getElementById('random-btn').style.display = 'inline-block';
                    displayProjects(projectCollection);
                }
            } catch (err) {
                statusLabel.style.background = '#ffeef0'; statusLabel.style.color = '#d9383a';
                statusLabel.textContent = 'Ошибка получения данных. Нажмите Ctrl+F5.';
                console.error(err);
            }
        }

        document.getElementById('search-input').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase().trim();
            displayProjects(projectCollection.filter(item => item.title.toLowerCase().includes(term)));
        });

        function displayProjects(list) {
            const container = document.getElementById('projects-container');
            container.innerHTML = '';
            list.forEach(item => {
                const card = document.createElement('div');
                card.className = 'project-card';
                const pId = item.id || item.project_id;
                const imgUrl = `https://mit.edu/${pId}_282x218.png`;
                
                card.innerHTML = `<img src="${imgUrl}" loading="lazy"><div class="project-card-title">${item.title}</div>`;
                card.onclick = () => { 
                    toggleView(true); 
                    document.getElementById('game-title').textContent = item.title; 
                    document.getElementById('scratch-player').src = `https://mit.edu/${pId}/embed`; 
                };
                container.appendChild(card);
            });
        }

        function playRandomGame() {
            if (!projectCollection.length) return;
            const randomProject = projectCollection[Math.floor(Math.random() * projectCollection.length)];
            const pId = randomProject.id || randomProject.project_id;
            toggleView(true);
            document.getElementById('game-title').textContent = randomProject.title;
            document.getElementById('scratch-player').src = `https://mit.edu/${pId}/embed`;
        }

        function toggleView(showGame) {
            document.getElementById('catalog-view').style.display = showGame ? 'none' : 'block';
            document.getElementById('game-view').style.display = showGame ? 'block' : 'none';
            if (!showGame) { 
                document.getElementById('scratch-player').src = ''; 
                displayProjects(projectCollection); 
                document.getElementById('search-input').value = ''; 
            }
        }

        fetchStudioProjects();
    </script>
</body>
</html>
