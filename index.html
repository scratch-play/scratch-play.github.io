<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scratch Студия</title>
    <style>
        /* ... ваш CSS-код ... */
    </style>
</head>
<body>
    <!-- ... ваш HTML ... -->
    <script>
        const STUDIO_ID = '51676986';
        const PAGE_LIMIT = 40;
        const PROXY_URL = 'https://api.proxyserver.com/'; // замените на свой прокси
        let offset = 0;
        let projectCollection = [];

        async function fetchStudioProjects() {
            try {
                const apiTarget = `https://mit.edu/${STUDIO_ID}/projects?limit=${PAGE_LIMIT}&offset=${offset}&_nocache=${Date.now()}`;
                const response = await fetch(PROXY_URL + encodeURIComponent(apiTarget));

                if (!response.ok) {
                    throw new Error(`Ошибка ${response.status}: ${response.statusText}`);
                }

                const contentType = response.headers.get("Content-Type");
                if (!contentType || !contentType.includes("application/json")) {
                    throw new Error("Ответ не является JSON");
                }

                const data = await response.json();

                if (data && data.length > 0) {
                    projectCollection = projectCollection.concat(data);
                    offset += PAGE_LIMIT;
                    updateStatus(`Загрузка... Получено: ${projectCollection.length}`);
                    setTimeout(fetchStudioProjects, 250);
                } else {
                    updateStatus(`Успешно загружено: ${projectCollection.length}`);
                    enableSearchInput();
                    displayProjects(projectCollection);
                }
            } catch (error) {
                updateStatus(`Ошибка получения данных: ${error.message}`);
                console.error(error);
            }
        }

        function updateStatus(message) {
            document.getElementById('status').textContent = message;
        }

        function enableSearchInput() {
            document.getElementById('search-input').disabled = false;
            document.getElementById('random-btn').style.display = 'inline-block';
        }

        function displayProjects(projects) {
            const container = document.getElementById('projects-container');
            container.innerHTML = '';

            projects.forEach((project) => {
                const card = document.createElement('div');
                card.className = 'project-card';

                const projectId = project.id || project.project_id;
                const imgUrl = `https://mit.edu/${projectId}_282x218.png`;

                card.innerHTML = `
                    <img src="${imgUrl}" loading="lazy">
                    <div class="project-card-title">${project.title}</div>
                `;

                card.onclick = () => {
                    showProject(projectId, project.title);
                };

                container.appendChild(card);
            });
        }

        function showProject(projectId, title) {
            document.getElementById('catalog-view').style.display = 'none';
            document.getElementById('game-view').style.display = 'block';

            document.getElementById('game-title').textContent = title;
            document.getElementById('scratch-player').src = `https://mit.edu/${projectId}/embed`;
        }

        document.getElementById('search-input').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase().trim();
            const filteredProjects = projectCollection.filter((project) => {
                return project.title.toLowerCase().includes(searchTerm);
            });

            displayProjects(filteredProjects);
        });

        document.getElementById('random-btn').addEventListener('click', () => {
            const randomProject = projectCollection[Math.floor(Math.random() * projectCollection.length)];
            showProject(randomProject.id || randomProject.project_id, randomProject.title);
        });

        fetchStudioProjects();
    </script>
</body>
</html>
