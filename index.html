<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Scratch Studio Projects</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1e1e2f;
      color: white;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 {
      margin-bottom: 16px;
    }
    #container {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
      max-width: 1024px;
      width: 100%;
    }
    .card {
      background: #2a2a3f;
      border-radius: 8px;
      width: 180px;
      cursor: pointer;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
      transition: transform 0.15s ease-in-out;
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: white;
    }
    .card:hover {
      transform: scale(1.05);
    }
    .card img {
      display: block;
      width: 100%;
      height: 135px;
      object-fit: cover;
      background: #000;
    }
    .card .title {
      padding: 8px;
      font-weight: bold;
      font-size: 14px;
      height: 48px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #loadMoreContainer {
      margin: 20px;
    }
    #loadMoreBtn {
      background: #556ee6;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    #loadMoreBtn:hover:enabled {
      background: #4059c9;
    }
    #loadMoreBtn:disabled {
      background: #999;
      cursor: not-allowed;
    }
    .error {
      margin-top: 20px;
      color: #ff5555;
      font-weight: bold;
      text-align: center;
    }
  </style>
</head>
<body>

<h1>Проекты Scratch студии</h1>

<div id="container"></div>

<div id="loadMoreContainer">
  <button id="loadMoreBtn">Загрузить ещё</button>
</div>

<script>
  const studioId = 51676986;
  const limit = 12; // проектов за запрос
  let offset = 0;
  let allLoaded = false;
  let isLoading = false;

  const container = document.getElementById('container');
  const loadMoreBtn = document.getElementById('loadMoreBtn');
  const loadMoreContainer = document.getElementById('loadMoreContainer');

  async function loadProjects() {
    if (isLoading || allLoaded) return;
    isLoading = true;
    loadMoreBtn.disabled = true;
    loadMoreBtn.textContent = 'Загрузка...';

    const apiUrl = `https://api.scratch.mit.edu/studios/${studioId}/projects?limit=${limit}&offset=${offset}`;
    const proxyUrl = 'https://api.allorigins.win/get?url=' + encodeURIComponent(apiUrl);

    try {
      const resp = await fetch(proxyUrl);
      if (!resp.ok) throw new Error(`Ошибка сети: ${resp.status}`);

      const data = await resp.json();
      const projects = JSON.parse(data.contents);

      if (!Array.isArray(projects) || projects.length === 0) {
        if (offset === 0) {
          container.innerHTML = `<div class="error">В студии нет опубликованных проектов</div>`;
        }
        allLoaded = true;
        loadMoreContainer.style.display = 'none';
        return;
      }

      for (const proj of projects) {
        const card = document.createElement('a');
        card.className = 'card';
        card.href = `/game#${proj.id}`;
        card.title = proj.title;

        // Обложка проекта Scratch — всегда доступна по шаблону
        // https://cdn2.scratch.mit.edu/get_image/project/ID_проекта_480x360.png
        const img = document.createElement('img');
        img.src = `https://cdn2.scratch.mit.edu/get_image/project/${proj.id}_480x360.png`;
        img.alt = proj.title;

        const titleDiv = document.createElement('div');
        titleDiv.className = 'title';
        titleDiv.textContent = proj.title;

        card.appendChild(img);
        card.appendChild(titleDiv);

        container.appendChild(card);
      }

      offset += projects.length;
      if (projects.length < limit) {
        allLoaded = true;
        loadMoreContainer.style.display = 'none';
      }

    } catch (e) {
      console.error('Ошибка при загрузке:', e);
      if (offset === 0) {
        container.innerHTML = `<div class="error">Ошибка при загрузке проектов: ${e.message}</div>`;
        loadMoreContainer.style.display = 'none';
      }
    } finally {
      isLoading = false;
      if (!allLoaded) {
        loadMoreBtn.disabled = false;
        loadMoreBtn.textContent = 'Загрузить ещё';
      }
    }
  }

  loadMoreBtn.addEventListener('click', () => {
    loadProjects();
  });

  // Загрузка первой порции при старте
  loadProjects();

</script>

</body>
</html>
