<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Проекты студии Scratch</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fafafa;
      padding: 20px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }
    .project-card {
      width: 250px;
      margin: 10px;
      border-radius: 8px;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      cursor: pointer;
      overflow: hidden;
      transition: transform 0.15s ease-in-out;
    }
    .project-card:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 12px rgba(0,0,0,0.25);
    }
    .project-thumb {
      width: 100%;
      display: block;
    }
    .project-info {
      padding: 10px;
    }
    .project-title {
      font-weight: bold;
      font-size: 18px;
      margin: 5px 0;
      color: #333;
      text-decoration: none;
      display: block;
    }
    .project-author {
      color: #555;
      font-size: 14px;
      text-decoration: none;
    }
  </style>
</head>
<body>

<div id="projects-container">Загрузка проектов...</div>

<script>
  const container = document.getElementById('projects-container');
  
  async function loadProjects() {
    try {
      // Используем прокси-API, чтобы получить json проектов в студии
      const studioId = '51676986';
      const url = `https://scratch-play-proxy.vercel.app/studios/${studioId}/projects?limit=40&offset=0`;

      const res = await fetch(url);
      if (!res.ok) throw new Error('Ошибка при загрузке проектов');

      const data = await res.json();
      if (!data.projects || data.projects.length === 0) {
        container.textContent = 'Проекты не найдены.';
        return;
      }

      container.textContent = '';
      
      data.projects.forEach(proj => {
        // Данные: proj.id, proj.title, proj.image (обложка), proj.author.username
        
        const card = document.createElement('a');
        card.className = 'project-card';
        card.href = `/game#${proj.id}`;
        card.target = '_blank'; // открыть в новой вкладке — по желанию
        card.rel = 'noopener noreferrer';

        card.innerHTML = `
          <img class="project-thumb" src="${proj.image}" alt="${proj.title}" />
          <div class="project-info">
            <span class="project-title">${proj.title}</span>
            <span class="project-author">автор: ${proj.author.username}</span>
          </div>
        `;

        container.appendChild(card);
      });
      
    } catch (e) {
      container.textContent = 'Ошибка загрузки проектов: ' + e.message;
      console.error(e);
    }
  }

  loadProjects();
</script>

</body>
</html>
