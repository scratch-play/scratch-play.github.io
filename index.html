<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Проекты Scratch студии - Быстрая загрузка</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #121227;
    color: #eee;
    margin: 0; padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h1 {
    margin-bottom: 16px;
  }
  #container {
    display: grid;
    grid-template-columns: repeat(auto-fill,minmax(160px,1fr));
    gap: 12px;
    width: 100%;
    max-width: 960px;
  }
  .card {
    background: #1e1e3f;
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    color: #eee;
    box-shadow: 0 3px 6px rgb(34 41 63 / 0.5);
    display: flex;
    flex-direction: column;
    text-decoration: none;
    transition: transform 0.15s ease;
  }
  .card:hover {
    transform: scale(1.05);
  }
  .card img {
    width: 100%;
    height: 100px;
    object-fit: cover;
    background: #111;
    display: block;
  }
  .title {
    padding: 8px;
    font-weight: 600;
    font-size: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #loadMoreBtn {
    margin: 20px;
    padding: 10px 24px;
    font-size: 16px;
    background-color: #4060f8;
    border: none;
    border-radius: 6px;
    color: white;
    cursor: pointer;
    user-select: none;
    transition: background-color 0.3s ease;
    min-width: 140px;
  }
  #loadMoreBtn:disabled {
    background-color: #666;
    cursor: not-allowed;
  }
  #loadMoreBtn:hover:not(:disabled) {
    background-color: #2e4add;
  }
  .error {
    margin-top: 20px;
    font-weight: bold;
    color: #f55;
  }
</style>
</head>
<body>

<h1>Проекты студии Scratch</h1>

<div id="container"></div>
<button id="loadMoreBtn">Загрузить ещё</button>
<div class="error" id="errorMsg" style="display:none;"></div>

<script>
  const container = document.getElementById('container');
  const loadMoreBtn = document.getElementById('loadMoreBtn');
  const errorMsg = document.getElementById('errorMsg');

  const studioId = 51676986;
  const limit = 20;
  let offset = 0;
  let loading = false;
  let allLoaded = false;

  async function fetchProjects() {
    if (loading || allLoaded) return;
    loading = true;
    loadMoreBtn.disabled = true;
    loadMoreBtn.textContent = "Загрузка...";
    errorMsg.style.display = 'none';

    const apiUrl = `https://api.scratch.mit.edu/studios/${studioId}/projects?limit=${limit}&offset=${offset}`;
    const proxyUrl = 'https://cors.bridged.cc/' + apiUrl;

    try {
      const response = await fetch(proxyUrl, {cache: "no-store"});
      if (!response.ok) throw new Error(`HTTP ${response.status}`);

      const projects = await response.json();

      if (!Array.isArray(projects) || projects.length === 0) {
        if (offset === 0) {
          errorMsg.textContent = "В студии нет проектов.";
          errorMsg.style.display = "block";
        }
        allLoaded = true;
        loadMoreBtn.style.display = "none";
        return;
      }

      for (const project of projects) {
        const card = document.createElement('a');
        card.className = 'card';
        card.href = `/game#${project.id}`;
        card.title = project.title;
        card.target = '_self';

        const img = document.createElement('img');
        img.src = `https://cdn2.scratch.mit.edu/get_image/project/${project.id}_480x360.png`;
        img.alt = project.title;
        img.loading = 'lazy';

        const title = document.createElement('div');
        title.className = 'title';
        title.textContent = project.title;

        card.appendChild(img);
        card.appendChild(title);
        container.appendChild(card);
      }

      offset += projects.length;

      if (projects.length < limit) {
        allLoaded = true;
        loadMoreBtn.style.display = "none";
      }
    } catch (e) {
      errorMsg.textContent = `Ошибка при загрузке: ${e.message}`;
      errorMsg.style.display = "block";
      if (offset === 0) loadMoreBtn.style.display = "none";
    } finally {
      loading = false;
      if (!allLoaded) {
        loadMoreBtn.disabled = false;
        loadMoreBtn.textContent = "Загрузить ещё";
      }
    }
  }

  loadMoreBtn.addEventListener('click', fetchProjects);

  fetchProjects();
</script>

</body>
</html>
