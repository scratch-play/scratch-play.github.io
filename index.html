<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проекты из студии Scratch-Play</title>
    <style>
        .projects { display: flex; flex-wrap: wrap; }
        .project { margin: 10px; padding: 10px; border: 1px solid #ccc; border-radius: 10px; cursor: pointer; background: #f9f9f9; }
        .project:hover { background: #e0e0e0; }
        #game { width: 100%; height: 600px; }
        #status { font-weight: bold; color: #555; margin: 10px 0; }
    </style>
</head>
<body>
    <div id="projects-page">
        <h1>Проекты</h1>
        <div id="status">Загрузка проектов...</div>
        <div class="projects" id="projects"></div>
    </div>

    <div id="game" style="display:none;">
        <button onclick="backToProjects()" style="padding: 10px; margin-bottom: 10px; cursor: pointer;">← Назад к списку</button>
        <h1>Игра</h1>
        <iframe src="" frameborder="0" width="100%" height="100%" allowtransparency="true" allowfullscreen="true"></iframe>
    </div>

    <script>
        const STUDIO_ID = '51676986'; 
        const LIMIT = 40; // Максимальный лимит для API Scratch per request
        let allProjects = [];

        // Функция для последовательного сбора всех проектов
        async function fetchAllProjects() {
            const statusElement = document.getElementById('status');
            let offset = 0;
            let hasMore = true;

            try {
                while (hasMore) {
                    statusElement.textContent = `Загружено проектов: ${allProjects.length}...`;
                    
                    // Запрос к официальному API с параметрами лимита и смещения
                    const response = await fetch(`https://mit.edu{STUDIO_ID}/projects?limit=${LIMIT}&offset=${offset}`);
                    
                    if (!response.ok) throw new Error('Ошибка сети при ответе API');
                    
                    const data = await response.json();

                    if (data && data.length > 0) {
                        allProjects = allProjects.concat(data);
                        offset += LIMIT; // Сдвигаем указатель на следующие 40 элементов
                    } else {
                        hasMore = false; // Если пришел пустой массив — проекты закончились
                    }
                }

                statusElement.textContent = `Всего найдено проектов: ${allProjects.length}`;
                renderProjects(allProjects);

            } catch (error) {
                console.error(error);
                statusElement.textContent = 'Не удалось загрузить проекты. Проверьте ID студии.';
            }
        }

        // Функция отрисовки интерфейса
        function renderProjects(projectsList) {
            const projectsElement = document.getElementById('projects');
            projectsElement.innerHTML = ''; // Очищаем контейнер

            projectsList.forEach(project => {
                const projectElement = document.createElement('div');
                projectElement.classList.add('project');
                projectElement.textContent = project.title;
                
                projectElement.onclick = () => {
                    const gameElement = document.getElementById('game');
                    gameElement.style.display = 'block';
                    document.getElementById('projects-page').style.display = 'none';
                    
                    const iframe = gameElement.querySelector('iframe');
                    // Используем ID проекта для создания фрейма
                    iframe.src = `https://mit.edu{project.id}/embed`;
                };
                projectsElement.appendChild(projectElement);
            });
        }

        function backToProjects() {
            document.getElementById('game').style.display = 'none';
            document.getElementById('projects-page').style.display = 'block';
            // Сбрасываем фрейм, чтобы музыка/игра из Scratch прекратилась при выходе
            document.getElementById('game').querySelector('iframe').src = ''; 
        }

        // Запуск процесса при загрузке страницы
        fetchAllProjects();
    </script>
</body>
</html>
