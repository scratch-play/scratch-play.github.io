<script>
    const STUDIO_ID = '51676986';
    const LIMIT = 40;
    let offset = 0;
    let allProjects = []; 
    const PROXY_URL = 'https://corsproxy.io?';

    async function loadNextBatch() {
        const statusElement = document.getElementById('status');
        try {
            // Исправлена ссылка на API Scratch и синтаксис шаблонизатора (добавлен знак $)
            const targetUrl = `https://mit.edu{STUDIO_ID}/projects?limit=${LIMIT}&offset=${offset}&_nocache=${Date.now()}`;
            const finalUrl = PROXY_URL + encodeURIComponent(targetUrl);
            
            const response = await fetch(finalUrl);
            if (!response.ok) throw new Error('Ошибка ответа сервера');
            
            const data = await response.json();
            
            if (data && data.length > 0) {
                allProjects = allProjects.concat(data);
                offset += LIMIT;
                statusElement.textContent = `Загрузка... Собрано проектов: ${allProjects.length}`;
                
                // Делаем паузу между страницами для обхода защиты от спама
                await new Promise(resolve => setTimeout(resolve, 1000));
                loadNextBatch();
            } else {
                if (allProjects.length === 0) {
                    statusElement.textContent = 'В студии нет доступных проектов.';
                } else {
                    statusElement.textContent = `Успешно загружено проектов: ${allProjects.length}`;
                    renderProjects(allProjects);
                }
            }
        } catch (error) {
            console.error('Ошибка при загрузке:', error);
            statusElement.style.background = '#ffdddd';
            statusElement.style.color = '#cc0000';
            statusElement.textContent = 'Ошибка загрузки. Пожалуйста, подождите минуту и обновите страницу через Ctrl+F5.';
        }
    }

    function renderProjects(projectsList) {
        const projectsElement = document.getElementById('projects');
        projectsElement.innerHTML = '';
        
        projectsList.forEach(project => {
            const projectElement = document.createElement('div');
            projectElement.classList.add('project');
            projectElement.textContent = project.title;
            
            projectElement.onclick = () => {
                document.getElementById('projects-page').style.display = 'none';
                document.getElementById('game-container').style.display = 'block';
                document.getElementById('game-title').textContent = project.title;
                
                // Исправлена ссылка на Scratch-плеер (добавлен знак $)
                document.getElementById('scratch-iframe').src = `https://mit.edu{project.id}/embed`;
            };
            projectsElement.appendChild(projectElement);
        });
    }

    function backToProjects() {
        document.getElementById('game-container').style.display = 'none';
        document.getElementById('projects-page').style.display = 'block';
        document.getElementById('scratch-iframe').src = '';
    }

    loadNextBatch();
</script>
